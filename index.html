<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Star Career</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Toast container -->
    <div id="toastContainer"></div>

    <div class="container">
        <h1>🎸 ROCK STAR CAREER 🎸</h1>

        <div class="creation-screen active" id="creationScreen">
            <div class="form-group">
                <label for="playerName">Nom de scène :</label>
                <input type="text" id="playerName" placeholder="Ex: Axl Fury">
            </div>
            <div class="form-group">
                <label for="instrument">Instrument :</label>
                <select id="instrument">
                    <option value="guitare">Guitare Électrique</option>
                    <option value="basse">Basse</option>
                    <option value="batterie">Batterie</option>
                    <option value="chant">Chant</option>
                    <option value="clavier">Clavier</option>
                </select>
            </div>
            <button onclick="startGame()">Commencer la Carrière</button>
        </div>

        <div class="death-screen" id="deathScreen">
            <div style="font-size: 3em; color: #ff0000; text-shadow: 0 0 20px #ff0000; margin-bottom: 30px; text-align: center;">☠️ R.I.P ☠️</div>
            <div id="deathMessage" style="font-size: 1.5em; margin-bottom: 30px; text-align: center;"></div>
            <div id="deathStats" style="margin-bottom: 30px; text-align: center;"></div>
            <button onclick="location.reload()" style="display: block; margin: 0 auto;">Nouvelle Carrière</button>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="header-info">
                <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <div class="player-name" id="displayName"></div>
                        <div class="stat-label" id="displayInstrument"></div>
                        <div class="stat-label" id="displayGroup">Solo</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #ffd700; font-size: 1.1em; font-weight: bold;">💰 <span id="displayMoney">0</span> €</div>
                        <div style="color: #ff6b6b;">👥 <span id="displayFans">0</span> fans</div>
                        <div id="passiveIncomeDisplay" style="color: #00ff00; font-size: 0.9em; display: none;"></div>
                    </div>
                </div>
                <div class="health-bar" style="margin-top: 10px;">
                    <div class="health-fill health-good" id="healthBar">100%</div>
                </div>
                <div style="color: #ff6b6b; margin-top: 8px; font-size: 0.9em;">
                    🕐 Âge: <span id="displayAge">18</span> ans | 
                    💊 Addiction: <span id="displayAddiction">0</span>%
                </div>
            </div>

            <div class="main-layout">
                <div class="sidebar" id="sidebar">
                    <button onclick="showView('concert')" id="btn-concert">🎤 Concerts</button>
                    <button onclick="showView('training')" id="btn-training">📚 Entraînement</button>
                    <button onclick="showView('albums')" id="btn-albums">💿 Albums</button>
                    <button onclick="showView('shop')" id="btn-shop">🛒 Boutique</button>
                    <button onclick="showView('groups')" id="btn-groups">🎸 Groupes</button>
                    <button onclick="showView('lifestyle')" id="btn-lifestyle">💊 Lifestyle</button>
                    <button onclick="showView('social')" id="btn-social">📱 Réseaux Sociaux</button>
                    <div class="sidebar-divider"></div>
                    <button onclick="showView('stats')" id="btn-stats">📊 Statistiques</button>
                    <button onclick="showView('achievements')" id="btn-achievements">🏆 Achievements</button>
                    <button onclick="showView('history')" id="btn-history">📜 Historique</button>
                    <div class="sidebar-divider"></div>
                    <button onclick="saveGame()" class="btn-save">💾 Sauvegarder</button>
                </div>
                <div class="content-area" id="contentArea"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="player.js"></script>
    <script src="game.js"></script>
    <script src="concerts.js"></script>
    <script src="training.js"></script>
    <script src="albums.js"></script>
    <script src="shop.js"></script>
    <script src="groups.js"></script>
    <script src="lifestyle.js"></script>
    <script src="social.js"></script>
    <script src="views.js"></script>
</body>
</html>
